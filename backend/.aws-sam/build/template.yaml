AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: "PlantApp backend \u2014 Lambda functions + API Gateway + DynamoDB"
Globals:
  Function:
    Runtime: nodejs22.x
    Architectures:
    - arm64
    Timeout: 10
    MemorySize: 256
    Environment:
      Variables:
        TABLE_NAME:
          Ref: GardeningTable
        ALLOWED_ORIGIN:
          Ref: AllowedOrigin
Parameters:
  AllowedOrigin:
    Type: String
    Default: '*'
    Description: 'CORS allowed origin. Set to your Amplify URL in production.

      '
  PerenualApiKey:
    Type: String
    NoEcho: true
    Default: ''
    Description: 'Perenual API key. Get a free key at https://perenual.com/api

      '
Resources:
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: plantapp-users
      UsernameAttributes:
      - email
      AutoVerifiedAttributes:
      - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: false
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
      Schema:
      - Name: email
        AttributeDataType: String
        Required: true
        Mutable: true
  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: plantapp-web
      UserPoolId:
        Ref: UserPool
      GenerateSecret: false
      ExplicitAuthFlows:
      - ALLOW_USER_SRP_AUTH
      - ALLOW_REFRESH_TOKEN_AUTH
      PreventUserExistenceErrors: ENABLED
  GardeningTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: GardeningAppData
      BillingMode: PAY_PER_REQUEST
      KeySchema:
      - AttributeName: PK
        KeyType: HASH
      - AttributeName: SK
        KeyType: RANGE
      AttributeDefinitions:
      - AttributeName: PK
        AttributeType: S
      - AttributeName: SK
        AttributeType: S
  DynamoPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Action:
          - dynamodb:GetItem
          - dynamodb:PutItem
          - dynamodb:DeleteItem
          - dynamodb:Query
          - dynamodb:UpdateItem
          Resource:
            Fn::GetAtt:
            - GardeningTable
            - Arn
  PlantApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      Auth:
        DefaultAuthorizer: CognitoAuthorizer
        Authorizers:
          CognitoAuthorizer:
            IdentitySource: $request.header.Authorization
            JwtConfiguration:
              issuer:
                Fn::Sub: https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}
              audience:
              - Ref: UserPoolClient
      CorsConfiguration:
        AllowOrigins:
        - Ref: AllowedOrigin
        AllowHeaders:
        - Content-Type
        - Authorization
        AllowMethods:
        - GET
        - POST
        - DELETE
        - OPTIONS
  GetPlantsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: plantapp-getPlants
      CodeUri: GetPlantsFunction
      Handler: index.handler
      Policies:
      - Ref: DynamoPolicy
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: PlantApi
            Path: /gardens/{userId}/plants
            Method: GET
    Metadata:
      SamResourceId: GetPlantsFunction
  AddPlantFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: plantapp-addPlant
      CodeUri: AddPlantFunction
      Handler: index.handler
      Policies:
      - Ref: DynamoPolicy
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: PlantApi
            Path: /gardens/{userId}/plants
            Method: POST
    Metadata:
      SamResourceId: AddPlantFunction
  RemovePlantFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: plantapp-removePlant
      CodeUri: RemovePlantFunction
      Handler: index.handler
      Policies:
      - Ref: DynamoPolicy
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: PlantApi
            Path: /gardens/{userId}/plants/{plantId}
            Method: DELETE
    Metadata:
      SamResourceId: RemovePlantFunction
  GetZoneFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: plantapp-getZone
      CodeUri: GetZoneFunction
      Handler: index.handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: PlantApi
            Path: /zone/{zipCode}
            Method: GET
            Auth:
              Authorizer: NONE
    Metadata:
      SamResourceId: GetZoneFunction
  SearchPlantsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: plantapp-searchPlants
      CodeUri: SearchPlantsFunction
      Handler: index.handler
      Environment:
        Variables:
          PERENUAL_API_KEY:
            Ref: PerenualApiKey
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: PlantApi
            Path: /plants/search
            Method: GET
            Auth:
              Authorizer: NONE
    Metadata:
      SamResourceId: SearchPlantsFunction
Outputs:
  ApiBaseUrl:
    Description: Base URL for the PlantApp API
    Value:
      Fn::Sub: https://${PlantApi}.execute-api.${AWS::Region}.amazonaws.com
  TableName:
    Description: DynamoDB table name
    Value:
      Ref: GardeningTable
  UserPoolId:
    Description: "Cognito User Pool ID \u2014 set as VITE_USER_POOL_ID in Amplify\
      \ Hosting"
    Value:
      Ref: UserPool
  UserPoolClientId:
    Description: "Cognito App Client ID \u2014 set as VITE_USER_POOL_CLIENT_ID in\
      \ Amplify Hosting"
    Value:
      Ref: UserPoolClient
  AmplifyEnvVars:
    Description: Paste these into Amplify Hosting > Environment variables
    Value:
      Fn::Sub: 'VITE_API_URL=https://${PlantApi}.execute-api.${AWS::Region}.amazonaws.com

        VITE_USER_POOL_ID=${UserPool}

        VITE_USER_POOL_CLIENT_ID=${UserPoolClient}

        '
